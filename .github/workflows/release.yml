name: Desktop Release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  build-windows-release:
    name: Build Windows desktop package
    runs-on: windows-latest
    defaults:
      run:
        shell: pwsh
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install root and frontend dependencies
        run: |
          npm ci
          npm ci --prefix frontend

      - name: Install QWebBridge dependencies
        run: npx pnpm --dir _external/QWebBridge install --frozen-lockfile

      - name: Prepare backend virtual environment
        run: |
          python -m venv backend/.venv
          backend/.venv/Scripts/python.exe -m pip install --upgrade pip
          backend/.venv/Scripts/python.exe -m pip install -r backend/requirements.txt

      - name: Build installer and portable package
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
        run: npm run dist:win

      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: geo-flow-agent-windows
          path: |
            release/*.exe
            release/*.blockmap
          if-no-files-found: error

      - name: Publish GitHub Release on tag
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release/*.exe
            release/*.blockmap
